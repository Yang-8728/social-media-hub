version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: biliup-redis
    ports:
      - "6380:6379"
    restart: unless-stopped

  biliup-uploader:
    build:
      context: ./containers/biliup-uploader
      dockerfile: Dockerfile
    container_name: biliup-uploader
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./config:/app/cookies
      - ./videos/merged:/videos:ro
      - ./logs:/app/logs
    restart: unless-stopped
