apiVersion: apps/v1
kind: Deployment
metadata:
  name: uploader
  namespace: social-media-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uploader
  template:
    metadata:
      labels:
        app: uploader
    spec:
      containers:
      - name: uploader
        image: social-media-hub-uploader:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        volumeMounts:
        - name: videos
          mountPath: /app/videos
        - name: config
          mountPath: /app/config
      volumes:
      - name: videos
        hostPath:
          path: /mnt/c/Code/social-media-hub/videos
          type: DirectoryOrCreate
      - name: config
        hostPath:
          path: /mnt/c/Code/social-media-hub/config
          type: DirectoryOrCreate
