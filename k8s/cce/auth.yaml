apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: social-media-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      imagePullSecrets:
      - name: swr-secret
      containers:
      - name: auth
        image: swr.ap-southeast-2.myhuaweicloud.com/smh/auth:latest
        imagePullPolicy: Always
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        - name: sessions-volume
          mountPath: /app/temp
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
      volumes:
      - name: config-volume
        configMap:
          name: accounts-config
      - name: sessions-volume
        secret:
          secretName: ins-sessions
      - name: code-volume
        configMap:
          name: auth-code
