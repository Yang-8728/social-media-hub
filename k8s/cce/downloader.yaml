apiVersion: apps/v1
kind: Deployment
metadata:
  name: downloader
  namespace: social-media-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: downloader
  template:
    metadata:
      labels:
        app: downloader
    spec:
      imagePullSecrets:
      - name: swr-secret
      containers:
      - name: downloader
        image: swr.ap-southeast-2.myhuaweicloud.com/smh/downloader:latest
        imagePullPolicy: Always
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        - name: sessions-volume
          mountPath: /app/temp
      volumes:
      - name: config-volume
        configMap:
          name: accounts-config
      - name: sessions-volume
        secret:
          secretName: ins-sessions
