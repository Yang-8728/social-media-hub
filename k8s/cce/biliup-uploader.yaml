apiVersion: apps/v1
kind: Deployment
metadata:
  name: biliup-uploader
  namespace: social-media-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biliup-uploader
  template:
    metadata:
      labels:
        app: biliup-uploader
    spec:
      imagePullSecrets:
      - name: swr-secret
      containers:
      - name: biliup-uploader
        image: swr.ap-southeast-2.myhuaweicloud.com/smh/biliup-uploader:latest
        imagePullPolicy: Always
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
