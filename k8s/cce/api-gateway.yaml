apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: social-media-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
      - name: swr-secret
      containers:
      - name: api-gateway
        image: swr.ap-southeast-2.myhuaweicloud.com/smh/api-gateway:latest
        imagePullPolicy: Always
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: social-media-hub
  annotations:
    kubernetes.io/elb.class: performance
    kubernetes.io/elb.autocreate: |
      {
        "type": "public",
        "bandwidth_name": "cce-bandwidth-api-gateway",
        "bandwidth_chargemode": "bandwidth",
        "bandwidth_size": 5,
        "bandwidth_sharetype": "PER",
        "eip_type": "5_bgp",
        "l4_flavor_name": "L4_flavor.elb.s1.small",
        "available_zone": [
          "ap-southeast-2a",
          "ap-southeast-2b"
        ]
      }
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: api-gateway
