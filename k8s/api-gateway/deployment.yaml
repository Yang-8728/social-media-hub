# API Gateway Deployment
# 无状态服务，不需要 PV/PVC
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: social-media-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: social-media-hub-api-gateway:latest
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 8080 # 容器端口

        env:
        - name: REDIS_URL
          value: "redis://redis:6379"