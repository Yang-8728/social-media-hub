apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanner
  namespace: social-media-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scanner
  template:
    metadata:
      labels:
        app: scanner
    spec:
      containers:
      - name: scanner
        image: social-media-hub-scanner:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        volumeMounts:
        - name: config
          mountPath: /app/config
      volumes:
      - name: config
        hostPath:
          path: /mnt/c/Code/social-media-hub/config
          type: DirectoryOrCreate
