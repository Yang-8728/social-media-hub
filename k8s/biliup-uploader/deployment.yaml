apiVersion: apps/v1
kind: Deployment
metadata:
  name: biliup-uploader
  namespace: social-media-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biliup-uploader
  template:
    metadata:
      labels:
        app: biliup-uploader
    spec:
      containers:
      - name: biliup-uploader
        image: social-media-hub-biliup-uploader:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        volumeMounts:
        - name: videos
          mountPath: /app/videos
        - name: config
          mountPath: /app/config
        - name: chrome-profile
          mountPath: /app/chrome_profile
      volumes:
      - name: videos
        hostPath:
          path: /mnt/c/Code/social-media-hub/videos
          type: DirectoryOrCreate
      - name: config
        hostPath:
          path: /mnt/c/Code/social-media-hub/config
          type: DirectoryOrCreate
      - name: chrome-profile
        hostPath:
          path: /mnt/c/Code/social-media-hub/config/chrome_profile
          type: DirectoryOrCreate
