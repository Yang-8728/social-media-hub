# PersistentVolumeClaim - 持久卷生命
# 作用： 申请使用 PV，Pod 通过PVC挂在存储
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc # PVC 的名称（在命名空间内唯一）
  namespace: social-media-hub # 必须指定命名空间
spec:
  accessModes:
    - ReadWriteOnce # 必须和 PV 的 accessModes 一致
  resources:
    requests:
      storage: 5Gi # 申请 5GB，会自动绑定到 redis-pv