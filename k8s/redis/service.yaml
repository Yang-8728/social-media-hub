# Service - 服务
# 作用：提供固定的网络访问入口，其他 Pod 通过 redis：6379 访问
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: social-media-hub # 指定命名空间
spec:
  selector:
    app: redis # 转发流量到带有 app=redis 标签的 Pod
  ports:
  - port: 6379 # Redis 默认端口
    targetPort: 6379 # 转发到 Pod 的 6379 端口 
    protocol: TCP
  type: ClusterIP # 集群内部访问