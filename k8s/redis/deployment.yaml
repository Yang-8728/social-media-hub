# Deployment - 部署 Redis 容器
# 作用：运行 Redis Pod， 挂载 PVC 存储
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: social-media-hub # 指定命名空间
spec:
  replicas: 1 # 运行 1 个 Redis 副本
  selector:
    matchLabels:
      app: redis # 选择带有 app=redis 标签的 Pod
  template:
    metadata:
      labels:
        app: redis # Pod 的标签
    spec:
      containers:
      - name: redis
        image: redis:7-alpine # 使用 Redis 7 Alpine 镜像
        ports:
        - containerPort: 6379 # Redis 默认端口
        volumeMounts:
        - name: redis-data
          mountPath: /data # 挂载到容器的 /data 目录
        command: ["redis-server", "--appendonly", "yes"] # 启用 AOF 持久化
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-pvc # 使用之前创建的 PVC