# Helm Chart 配置文件
# 用于管理所有服务的配置参数

# 全局配置
global:
  # 镜像仓库地址（本地测试用，CCE 部署时改成 SWR 地址）
  imageRegistry: ""
  imagePullPolicy: IfNotPresent
  
  # Redis 连接配置
  redis:
    url: "redis://redis:6379"

# 命名空间
namespace: social-media-hub

# Redis 配置
redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
  replicas: 1
  persistence:
    enabled: true
    storageClass: ""  # 本地为空，CCE 使用 csi-disk
    size: 5Gi
    hostPath: /mnt/c/Code/social-media-hub/k8s-data/redis  # 仅本地使用
  service:
    type: ClusterIP
    port: 6379

# API Gateway 配置
apiGateway:
  enabled: true
  image:
    repository: social-media-hub-api-gateway
    tag: latest
  replicas: 1
  service:
    type: NodePort  # 本地用 NodePort，CCE 用 LoadBalancer
    port: 8000
    nodePort: 30080

# Auth 服务
auth:
  enabled: true
  image:
    repository: social-media-hub-auth
    tag: latest
  replicas: 1

# Scanner 服务
scanner:
  enabled: true
  image:
    repository: social-media-hub-scanner
    tag: latest
  replicas: 1

# Downloader 服务
downloader:
  enabled: true
  image:
    repository: social-media-hub-downloader
    tag: latest
  replicas: 1

# Standardizer 服务
standardizer:
  enabled: true
  image:
    repository: social-media-hub-standardizer
    tag: latest
  replicas: 1

# Merger 服务
merger:
  enabled: true
  image:
    repository: social-media-hub-merger
    tag: latest
  replicas: 1

# Uploader 服务
uploader:
  enabled: true
  image:
    repository: social-media-hub-uploader
    tag: latest
  replicas: 1

# Biliup Uploader 服务
biliupUploader:
  enabled: true
  image:
    repository: social-media-hub-biliup-uploader
    tag: latest
  replicas: 1

# 持久化存储配置
volumes:
  # 视频存储
  videos:
    hostPath: /mnt/c/Code/social-media-hub/videos  # 本地路径
    storageClass: ""  # CCE 使用 csi-disk
    size: 100Gi
  
  # 配置文件
  config:
    hostPath: /mnt/c/Code/social-media-hub/config
    storageClass: ""
    size: 1Gi
  
  # Chrome Profile（用于 Biliup）
  chromeProfile:
    hostPath: /mnt/c/Code/social-media-hub/config/chrome_profile
    storageClass: ""
    size: 5Gi
