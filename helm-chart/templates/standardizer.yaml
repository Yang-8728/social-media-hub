{{- if .Values.standardizer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: standardizer
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.standardizer.replicas }}
  selector:
    matchLabels:
      app: standardizer
  template:
    metadata:
      labels:
        app: standardizer
    spec:
      containers:
      - name: standardizer
        image: {{ .Values.global.imageRegistry }}{{ .Values.standardizer.image.repository }}:{{ .Values.standardizer.image.tag }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        env:
        - name: REDIS_URL
          value: {{ .Values.global.redis.url | quote }}
        volumeMounts:
        - name: videos
          mountPath: /app/videos
      volumes:
      - name: videos
        hostPath:
          path: {{ .Values.volumes.videos.hostPath }}
          type: DirectoryOrCreate
{{- end }}
