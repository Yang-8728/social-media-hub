{{- if .Values.downloader.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: downloader
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.downloader.replicas }}
  selector:
    matchLabels:
      app: downloader
  template:
    metadata:
      labels:
        app: downloader
    spec:
      containers:
      - name: downloader
        image: {{ .Values.global.imageRegistry }}{{ .Values.downloader.image.repository }}:{{ .Values.downloader.image.tag }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        env:
        - name: REDIS_URL
          value: {{ .Values.global.redis.url | quote }}
        volumeMounts:
        - name: videos
          mountPath: /app/videos
        - name: config
          mountPath: /app/config
      volumes:
      - name: videos
        hostPath:
          path: {{ .Values.volumes.videos.hostPath }}
          type: DirectoryOrCreate
      - name: config
        hostPath:
          path: {{ .Values.volumes.config.hostPath }}
          type: DirectoryOrCreate
{{- end }}
